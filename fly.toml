# Fly.io configuration for Riddle application
app = "bloom-riddle-94a1af8b"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  remote = false

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]